  termination_penalty: 50.0
  sale_revenue_retailer: 2.5
  holding_weight: 0.3
  backlog_weight: 1.5
  ordering_weight: 0.1
  target_stock_days_retailer: 8
  target_stock_days_dc: 14
  excess_penalty_retailer: 0.3
  excess_penalty_dc: 0.03
  alpha: 0.2
  heuristic_shaping:
