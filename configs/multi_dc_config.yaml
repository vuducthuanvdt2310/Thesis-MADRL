# Multi-DC 2-Echelon Inventory Environment Configuration

environment:
  n_skus: 3  # Number of products
  n_retailers: 15 # Number of retailers
  max_days: 365  # Episode length
  
  lead_time:
    # Supplier → DC (long-distance, variable)
    supplier_to_dc:
      distribution: "uniform"
      min: 15
      max: 25
    
    # DC → Retailer (fixed at 1 day; variable lead time only for supplier→DC)
    dc_to_retailer:
      distribution: "fixed"
      min: 1
      max: 1

# DC-to-Retailer exclusive assignment
# Each retailer can only order from its assigned DC.
# Values are 0-indexed retailer indices (not agent IDs).
dc_assignments:
  dc_0: [0, 1, 2, 3, 4, 5, 6]          # Retailers 0-6  (agent IDs 2-8)
  dc_1: [7, 8, 9, 10, 11, 12, 13, 14]  # Retailers 7-14 (agent IDs 9-16)

# Constraints (Termination conditions)
constraints:
  # Minimum on-shelf quantity for each Retailer x SKU
  # If inventory drops below this value for ANY SKU at ANY retailer, the episode terminates.
  on_shelf_quantity:
    - [5.0, 5.0, 5.0]  # Retailer_0
    - [5.0, 5.0, 5.0]  # Retailer_1
    - [5.0, 5.0, 5.0]  # Retailer_2
    - [5.0, 5.0, 5.0]  # Retailer_3
    - [5.0, 5.0, 5.0]  # Retailer_4
    - [5.0, 5.0, 5.0]  # Retailer_5
    - [5.0, 5.0, 5.0]  # Retailer_6
    - [5.0, 5.0, 5.0]  # Retailer_7
    - [5.0, 5.0, 5.0]  # Retailer_8
    - [5.0, 5.0, 5.0]  # Retailer_9
    - [5.0, 5.0, 5.0]  # Retailer_10
    - [5.0, 5.0, 5.0]  # Retailer_11
    - [5.0, 5.0, 5.0]  # Retailer_12
    - [5.0, 5.0, 5.0]  # Retailer_13
    - [5.0, 5.0, 5.0]  # Retailer_14

  # Safety-stock threshold: a SOFT, continuous penalty (not termination).
  # Demand mean ~1.41 units/step/SKU. Safety stock = ~3 days demand = ~5 units.
  # Threshold must be calibrated to actual demand scale.
  safety_stock_threshold:
    - [5.0, 5.0, 5.0]  # Retailer_0
    - [5.0, 5.0, 5.0]  # Retailer_1
    - [5.0, 5.0, 5.0]  # Retailer_2
    - [5.0, 5.0, 5.0]  # Retailer_3
    - [5.0, 5.0, 5.0]  # Retailer_4
    - [5.0, 5.0, 5.0]  # Retailer_5
    - [5.0, 5.0, 5.0]  # Retailer_6
    - [5.0, 5.0, 5.0]  # Retailer_7
    - [5.0, 5.0, 5.0]  # Retailer_8
    - [5.0, 5.0, 5.0]  # Retailer_9
    - [5.0, 5.0, 5.0]  # Retailer_10
    - [5.0, 5.0, 5.0]  # Retailer_11
    - [5.0, 5.0, 5.0]  # Retailer_12
    - [5.0, 5.0, 5.0]  # Retailer_13
    - [5.0, 5.0, 5.0]  # Retailer_14

  # Per-unit-per-step penalty for falling below safety_stock_threshold.
  # Should be > backlog cost to strongly incentivize maintaining safety stock.
  safety_stock_penalty: 3.0

# Reward parameters
rewards:
  survival_reward: 0.0  # Bonus for each step not terminated
  termination_penalty: 500.0  # Penalty for violation termination

# Cost parameters (Unit: 10,000 VND)
costs:
  # DC Costs (2 DCs x 3 SKUs)
  holding_cost_dc:
    - [0.08, 0.06, 0.12]  # DC_0
    - [0.07, 0.05, 0.10]  # DC_1

  backlog_cost_dc:
    # Increased penalty: DC stockouts cascade to all assigned retailers
    - [2.0, 1.5, 3.0]  # DC_0
    - [2.0, 1.5, 3.0]  # DC_1
  
  fixed_order_cost_dc:
    - [50.0, 50.0, 50.0]  # DC_0 (reduced from 100 - less incentive to over-batch)
    - [50.0, 50.0, 50.0]  # DC_1
  
  # Retailer Costs (15 Retailers x 3 SKUs)
  holding_cost_retailer:
    # Demand mean=1.41/step. With inv=10 units, holding cost = 10*0.12=1.2/step.
    # Backlog at 1 unit = 2.0/step. Holding is CHEAP relative to backlog: correct ratio.
    - [0.12, 0.10, 0.15]  # Retailer_0
    - [0.12, 0.10, 0.15]  # Retailer_1
    - [0.12, 0.10, 0.15]  # Retailer_2
    - [0.12, 0.10, 0.15]  # Retailer_3
    - [0.12, 0.10, 0.15]  # Retailer_4
    - [0.12, 0.10, 0.15]  # Retailer_5
    - [0.12, 0.10, 0.15]  # Retailer_6
    - [0.12, 0.10, 0.15]  # Retailer_7
    - [0.12, 0.10, 0.15]  # Retailer_8
    - [0.12, 0.10, 0.15]  # Retailer_9
    - [0.12, 0.10, 0.15]  # Retailer_10
    - [0.12, 0.10, 0.15]  # Retailer_11
    - [0.12, 0.10, 0.15]  # Retailer_12
    - [0.12, 0.10, 0.15]  # Retailer_13
    - [0.12, 0.10, 0.15]  # Retailer_14
  
  backlog_cost_retailer:
    # Kept high to penalize stockouts. With demand~1.41/step,
    # 1 unit of backlog costs 2.0/step. Ordering 3 units costs ~2.0 (0.5 fixed + 0.5*3 var).
    # So ordering 3 units = cost of 1 unit in backlog for 1 step: rational to order.
    - [2.0, 1.8, 2.5]  # Retailer_0
    - [2.0, 1.8, 2.5]  # Retailer_1
    - [2.0, 1.8, 2.5]  # Retailer_2
    - [2.0, 1.8, 2.5]  # Retailer_3
    - [2.0, 1.8, 2.5]  # Retailer_4
    - [2.0, 1.8, 2.5]  # Retailer_5
    - [2.0, 1.8, 2.5]  # Retailer_6
    - [2.0, 1.8, 2.5]  # Retailer_7
    - [2.0, 1.8, 2.5]  # Retailer_8
    - [2.0, 1.8, 2.5]  # Retailer_9
    - [2.0, 1.8, 2.5]  # Retailer_10
    - [2.0, 1.8, 2.5]  # Retailer_11
    - [2.0, 1.8, 2.5]  # Retailer_12
    - [2.0, 1.8, 2.5]  # Retailer_13
    - [2.0, 1.8, 2.5]  # Retailer_14
  
  fixed_order_cost_retailer:
    # Low fixed cost: don't punish frequent small orders.
    # Demand is ~1.4/step; ordering every ~2-3 steps is optimal.
    - [0.2, 0.2, 0.2]  # Retailer_0
    - [0.2, 0.2, 0.2]  # Retailer_1
    - [0.2, 0.2, 0.2]  # Retailer_2
    - [0.2, 0.2, 0.2]  # Retailer_3
    - [0.2, 0.2, 0.2]  # Retailer_4
    - [0.2, 0.2, 0.2]  # Retailer_5
    - [0.2, 0.2, 0.2]  # Retailer_6
    - [0.2, 0.2, 0.2]  # Retailer_7
    - [0.2, 0.2, 0.2]  # Retailer_8
    - [0.2, 0.2, 0.2]  # Retailer_9
    - [0.2, 0.2, 0.2]  # Retailer_10
    - [0.2, 0.2, 0.2]  # Retailer_11
    - [0.2, 0.2, 0.2]  # Retailer_12
    - [0.2, 0.2, 0.2]  # Retailer_13
    - [0.2, 0.2, 0.2]  # Retailer_14
  
  # Variable costs for ordering from DCs (per unit transportation/handling)
  # Shape: (n_retailers, n_dcs, n_skus)
  # REDUCED: demand is ~1.4 units/step. Ordering 3 units should cost less than 1 unit in backlog.
  # Backlog cost = 2.0/unit/step. Ordering 3 units: 0.2 fixed + 0.15*3 = 0.65 total.
  # So ordering 3 units breaks even when expected backlog > 0.65/2.0 = 0.33 units/step.
  # With demand_std=1.99 and no safety stock, expected shortage >> 0.33. Agent WILL order.
  variable_cost_retailer:
    # Retailer_0
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_1
    - [ [0.18, 0.15, 0.25],
        [0.15, 0.12, 0.20] ]
    # Retailer_2
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_3
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_4
    - [ [0.18, 0.15, 0.25],
        [0.15, 0.12, 0.20] ]
    # Retailer_5
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_6
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_7
    - [ [0.18, 0.15, 0.25],
        [0.15, 0.12, 0.20] ]
    # Retailer_8
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_9
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_10
    - [ [0.18, 0.15, 0.25],
        [0.15, 0.12, 0.20] ]
    # Retailer_11
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_12
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]
    # Retailer_13
    - [ [0.18, 0.15, 0.25],
        [0.15, 0.12, 0.20] ]
    # Retailer_14
    - [ [0.15, 0.12, 0.20],
        [0.18, 0.15, 0.25] ]

# Market Pricing (for DC orders from supplier)
pricing:
  base_price: [10.0, 8.0, 15.0]  # Base prices per SKU
  min_price: [6.0, 4.0, 10.0]    # Price floor
  max_price: [18.0, 14.0, 25.0]  # Price ceiling
  volatility: 0.15  # ±15% typical variation
