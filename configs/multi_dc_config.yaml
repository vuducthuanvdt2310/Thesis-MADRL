# Multi-DC 2-Echelon Inventory Environment Configuration

environment:
  n_skus: 3  # Number of products
  n_retailers: 15 # Number of retailers
  max_days: 365  # Episode length
  
  lead_time:
    # Supplier → DC (reduced from 15-25 to 7-14 days)
    # With 15 retailers demanding ~1.41 units/step/SKU each, a DC sees ~10.5 units/step/SKU
    # drain. At 25-day lead time the DC needed 250+ units buffer — causing high holding costs.
    # At 7-14 days the DC only needs ~75-150 units buffer, reducing holding cost significantly
    # and allowing faster recovery from stockouts, which prevents retailer backlog cascades.
    supplier_to_dc:
      distribution: "uniform"
      min: 7
      max: 14
    
    # DC → Retailer (fixed at 1 day; variable lead time only for supplier→DC)
    dc_to_retailer:
      distribution: "fixed"
      min: 1
      max: 1

# DC-to-Retailer exclusive assignment
# Each retailer can only order from its assigned DC.
# Values are 0-indexed retailer indices (not agent IDs).
dc_assignments:
  dc_0: [0, 1, 2, 3, 4, 5, 6]          # Retailers 0-6  (agent IDs 2-8)
  dc_1: [7, 8, 9, 10, 11, 12, 13, 14]  # Retailers 7-14 (agent IDs 9-16)

# Constraints (Termination conditions)
constraints:
  # Minimum on-shelf quantity for each Retailer x SKU
  # If inventory drops below this value for ANY SKU at ANY retailer, the episode terminates.
  # Minimum on-shelf quantity - DISABLED (set to 0) to prevent premature
  # episode termination from triggering massive penalties before agents can learn.
  # The safety_stock_threshold below provides a gentler continuous signal instead.
  on_shelf_quantity:
    - [0.0, 0.0, 0.0]  # Retailer_0
    - [0.0, 0.0, 0.0]  # Retailer_1
    - [0.0, 0.0, 0.0]  # Retailer_2
    - [0.0, 0.0, 0.0]  # Retailer_3
    - [0.0, 0.0, 0.0]  # Retailer_4
    - [0.0, 0.0, 0.0]  # Retailer_5
    - [0.0, 0.0, 0.0]  # Retailer_6
    - [0.0, 0.0, 0.0]  # Retailer_7
    - [0.0, 0.0, 0.0]  # Retailer_8
    - [0.0, 0.0, 0.0]  # Retailer_9
    - [0.0, 0.0, 0.0]  # Retailer_10
    - [0.0, 0.0, 0.0]  # Retailer_11
    - [0.0, 0.0, 0.0]  # Retailer_12
    - [0.0, 0.0, 0.0]  # Retailer_13
    - [0.0, 0.0, 0.0]  # Retailer_14

  # Safety-stock threshold: a SOFT, continuous penalty (not termination).
  # Demand mean ~1.41 units/step/SKU. Safety stock = ~3 days demand = ~5 units.
  # Threshold must be calibrated to actual demand scale.
  safety_stock_threshold:
    - [5.0, 5.0, 5.0]  # Retailer_0
    - [5.0, 5.0, 5.0]  # Retailer_1
    - [5.0, 5.0, 5.0]  # Retailer_2
    - [5.0, 5.0, 5.0]  # Retailer_3
    - [5.0, 5.0, 5.0]  # Retailer_4
    - [5.0, 5.0, 5.0]  # Retailer_5
    - [5.0, 5.0, 5.0]  # Retailer_6
    - [5.0, 5.0, 5.0]  # Retailer_7
    - [5.0, 5.0, 5.0]  # Retailer_8
    - [5.0, 5.0, 5.0]  # Retailer_9
    - [5.0, 5.0, 5.0]  # Retailer_10
    - [5.0, 5.0, 5.0]  # Retailer_11
    - [5.0, 5.0, 5.0]  # Retailer_12
    - [5.0, 5.0, 5.0]  # Retailer_13
    - [5.0, 5.0, 5.0]  # Retailer_14

  # Per-unit-per-step penalty for falling below safety_stock_threshold.
  # Doubled relative to previous value: must be stronger than revenue signal to matter.
  safety_stock_penalty: 3.0

# Reward parameters
rewards:
  survival_reward: 0.0
  termination_penalty: 50.0

  # === SALE REVENUE BONUS (key service-level incentive) ===
  # Retailers earn this per unit of customer demand actually fulfilled each step.
  # DCs earn this per unit shipped to retailers each step.
  # Setting revenue >> holding_cost creates a clear gradient: stock shelves and earn,
  # empty shelves earn nothing. Agents will order proactively to maximize revenue.
  #
  # Calibration guide:
  #   demand_mean ~ 1.41 units/step/SKU. At 100% service level a retailer earns:
  #     3 SKUs * 1.41 * 5.0 = ~21.2 revenue/step
  #   Holding 5 units costs: 5 * 0.12 = 0.60/step  (cheap)
  #   Ordering 3 units costs: 0.05 fixed + 0.05*3 = 0.20 variable = 0.25/order (tiny)
  #   => Revenue from 1 served period easily exceeds all inventory costs.
  sale_revenue_retailer: 5.0   # per unit of customer demand fulfilled (retailer)
  sale_revenue_dc: 2.0          # per unit shipped to retailers (DC)

  # Alpha-weighted local + global reward mixing.
  # Each agent's reward = (1 - alpha) * local + alpha * global_mean.
  # 0.0 = purely local (old behaviour), 0.2 = recommended, 1.0 = purely global.
  alpha: 0.2

# Cost parameters (Unit: 10,000 VND)
costs:
  # DC Costs (2 DCs x 3 SKUs)
  # Holding cost kept low: DCs should hold MORE not less (they serve downstream retailers).
  holding_cost_dc:
    - [0.05, 0.04, 0.08]  # DC_0 (slightly reduced to encourage higher DC safety stock)
    - [0.04, 0.03, 0.07]  # DC_1

  backlog_cost_dc:
    # HIGH penalty: DC stockout cascades to ALL its assigned retailers.
    # Must be large enough that paying ordering cost < accepting backlog cost.
    # With sale_revenue_dc=2.0, each unit NOT shipped = lost 2.0 revenue + backlog accumulation.
    - [3.0, 2.5, 4.0]  # DC_0
    - [3.0, 2.5, 4.0]  # DC_1

  fixed_order_cost_dc:
    # Raised from 0.5 → 2.0: ensures a fixed ordering cost registers visibly
    # on the chart even against the large market-price variable component.
    # Still tiny vs DC holding/backlog (thousands per episode).
    - [2.0, 2.0, 2.0]  # DC_0
    - [2.0, 2.0, 2.0]  # DC_1
  
  # Retailer Costs (15 Retailers x 3 SKUs)
  holding_cost_retailer:
    # Demand mean=1.41/step. 
    # Increased heavily: we want to penalize retailers for hoarding 100+ units.
    # At holding_cost ~1.5/unit, 100 units = 150/step. 
    # With backlog at 6.0/unit, retailers will balance ~4 days of stock instead of massive hoarding.
    - [1.50, 1.20, 1.80]  # Retailer_0
    - [1.50, 1.20, 1.80]  # Retailer_1
    - [1.50, 1.20, 1.80]  # Retailer_2
    - [1.50, 1.20, 1.80]  # Retailer_3
    - [1.50, 1.20, 1.80]  # Retailer_4
    - [1.50, 1.20, 1.80]  # Retailer_5
    - [1.50, 1.20, 1.80]  # Retailer_6
    - [1.50, 1.20, 1.80]  # Retailer_7
    - [1.50, 1.20, 1.80]  # Retailer_8
    - [1.50, 1.20, 1.80]  # Retailer_9
    - [1.50, 1.20, 1.80]  # Retailer_10
    - [1.50, 1.20, 1.80]  # Retailer_11
    - [1.50, 1.20, 1.80]  # Retailer_12
    - [1.50, 1.20, 1.80]  # Retailer_13
    - [1.50, 1.20, 1.80]  # Retailer_14
  
  backlog_cost_retailer:
    # HIGH penalty: must exceed sale_revenue_retailer=5.0 per unit.
    # If 1 unit of backlog costs 6.0/step, agent must serve demand to avoid rapid loss.
    # Backlog is CUMULATIVE: 1 unit unserved costs 6.0 * remaining_days (huge late-game).
    - [6.0, 5.0, 8.0]  # Retailer_0
    - [6.0, 5.0, 8.0]  # Retailer_1
    - [6.0, 5.0, 8.0]  # Retailer_2
    - [6.0, 5.0, 8.0]  # Retailer_3
    - [6.0, 5.0, 8.0]  # Retailer_4
    - [6.0, 5.0, 8.0]  # Retailer_5
    - [6.0, 5.0, 8.0]  # Retailer_6
    - [6.0, 5.0, 8.0]  # Retailer_7
    - [6.0, 5.0, 8.0]  # Retailer_8
    - [6.0, 5.0, 8.0]  # Retailer_9
    - [6.0, 5.0, 8.0]  # Retailer_10
    - [6.0, 5.0, 8.0]  # Retailer_11
    - [6.0, 5.0, 8.0]  # Retailer_12
    - [6.0, 5.0, 8.0]  # Retailer_13
    - [6.0, 5.0, 8.0]  # Retailer_14
  
  fixed_order_cost_retailer:
    # Raised from 0.05 → 0.5 per SKU per order.
    # At 0.5 fixed + 0.6 variable, ordering 2 units/SKU costs ~1.7/SKU = ~5.1/step.
    # Revenue for 1.41 demand filled = 5.0*1.41 = 7.05/step/SKU  → still profitable.
    # Over 90 steps this adds ~460 ordering cost per retailer, a visible 5-8% slice.
    - [0.5, 0.5, 0.5]  # Retailer_0
    - [0.5, 0.5, 0.5]  # Retailer_1
    - [0.5, 0.5, 0.5]  # Retailer_2
    - [0.5, 0.5, 0.5]  # Retailer_3
    - [0.5, 0.5, 0.5]  # Retailer_4
    - [0.5, 0.5, 0.5]  # Retailer_5
    - [0.5, 0.5, 0.5]  # Retailer_6
    - [0.5, 0.5, 0.5]  # Retailer_7
    - [0.5, 0.5, 0.5]  # Retailer_8
    - [0.5, 0.5, 0.5]  # Retailer_9
    - [0.5, 0.5, 0.5]  # Retailer_10
    - [0.5, 0.5, 0.5]  # Retailer_11
    - [0.5, 0.5, 0.5]  # Retailer_12
    - [0.5, 0.5, 0.5]  # Retailer_13
    - [0.5, 0.5, 0.5]  # Retailer_14
  
  # Variable costs for ordering from DCs (per unit transportation/handling)
  # Shape: (n_retailers, n_dcs, n_skus)
  # Raised from 0.04-0.08 → 0.5-0.8/unit so ordering cost is ~5-8% of total.
  # Revenue = 5.0/unit demand fulfilled; ordering 2 units/step at 0.65/unit = 1.3 variable
  # vs 7.05 revenue → ordering still clearly profitable.
  variable_cost_retailer:
    # Retailer_0
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_1
    - [ [0.60, 0.50, 0.75],
        [0.50, 0.45, 0.65] ]
    # Retailer_2
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_3
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_4
    - [ [0.60, 0.50, 0.75],
        [0.50, 0.45, 0.65] ]
    # Retailer_5
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_6
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_7
    - [ [0.60, 0.50, 0.75],
        [0.50, 0.45, 0.65] ]
    # Retailer_8
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_9
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_10
    - [ [0.60, 0.50, 0.75],
        [0.50, 0.45, 0.65] ]
    # Retailer_11
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_12
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]
    # Retailer_13
    - [ [0.60, 0.50, 0.75],
        [0.50, 0.45, 0.65] ]
    # Retailer_14
    - [ [0.50, 0.45, 0.65],
        [0.60, 0.50, 0.75] ]

# Market Pricing (for DC orders from supplier)
pricing:
  # Prices reduced 10x so variable ordering cost competes fairly with holding/backlog costs.
  # At price=10, ordering 30 units cost 303 immediately vs backlog at 2.5/unit/step →
  # agents rationally avoided ordering. At price=1.0, ordering 30 units = 33 cost,
  # which breaks even against just ~1 unit of backlog for ~1 day → ordering is rational.
  base_price: [1.0, 0.8, 1.5]  # Base prices per SKU (reduced from [10, 8, 15])
  min_price: [0.6, 0.4, 1.0]   # Price floor  (reduced from [6, 4, 10])
  max_price: [1.8, 1.4, 2.5]   # Price ceiling (reduced from [18, 14, 25])
  volatility: 0.15  # ±15% typical variation
