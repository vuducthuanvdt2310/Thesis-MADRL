# Multi-DC 2-Echelon Inventory Environment Configuration

environment:
  n_skus: 3  # Number of products
  n_retailers: 15 # Number of retailers
  max_days: 365  # Episode length
  
  lead_time:
    # Supplier → DC (reduced from 15-25 to 7-14 days)
    # With 15 retailers demanding ~1.41 units/step/SKU each, a DC sees ~10.5 units/step/SKU
    # drain. At 25-day lead time the DC needed 250+ units buffer — causing high holding costs.
    # At 7-14 days the DC only needs ~75-150 units buffer, reducing holding cost significantly
    # and allowing faster recovery from stockouts, which prevents retailer backlog cascades.
    supplier_to_dc:
      distribution: "uniform"
      min: 7
      max: 14
    
    # DC → Retailer (fixed at 1 day; variable lead time only for supplier→DC)
    dc_to_retailer:
      distribution: "fixed"
      min: 1
      max: 1

# DC-to-Retailer exclusive assignment
# Each retailer can only order from its assigned DC.
# Values are 0-indexed retailer indices (not agent IDs).
dc_assignments:
  dc_0: [0, 1, 2, 3, 4, 5, 6]          # Retailers 0-6  (agent IDs 2-8)
  dc_1: [7, 8, 9, 10, 11, 12, 13, 14]  # Retailers 7-14 (agent IDs 9-16)

# Constraints (Termination conditions)
constraints:
  # Safety-stock threshold: a SOFT, continuous penalty (not termination).
  # Demand mean ~1.41 units/step/SKU. Safety stock = ~3 days demand = ~5 units.
  # Threshold must be calibrated to actual demand scale.
  safety_stock_threshold:
    - [5.0, 5.0, 5.0]  # Retailer_0
    - [5.0, 5.0, 5.0]  # Retailer_1
    - [5.0, 5.0, 5.0]  # Retailer_2
    - [5.0, 5.0, 5.0]  # Retailer_3
    - [5.0, 5.0, 5.0]  # Retailer_4
    - [5.0, 5.0, 5.0]  # Retailer_5
    - [5.0, 5.0, 5.0]  # Retailer_6
    - [5.0, 5.0, 5.0]  # Retailer_7
    - [5.0, 5.0, 5.0]  # Retailer_8
    - [5.0, 5.0, 5.0]  # Retailer_9
    - [5.0, 5.0, 5.0]  # Retailer_10
    - [5.0, 5.0, 5.0]  # Retailer_11
    - [5.0, 5.0, 5.0]  # Retailer_12
    - [5.0, 5.0, 5.0]  # Retailer_13
    - [5.0, 5.0, 5.0]  # Retailer_14

  # Per-unit-per-step penalty for falling below safety_stock_threshold.
  # Doubled relative to previous value: must be stronger than revenue signal to matter.
  safety_stock_penalty: 1.0

# Reward parameters
rewards:
  survival_reward: 0.0
  termination_penalty: 50.0

  # === SALE REVENUE BONUS (key service-level incentive) ===
  # Retailers earn this per unit of customer demand actually fulfilled each step.
  # DCs earn this per unit shipped to retailers each step.
  # Reduced from 5.0 → 2.5 for retailers: previously the very high revenue signal caused
  # agents to massively over-order just to guarantee zero missed sales, resulting in
  # holding costs dominating (~95%) the total cost breakdown. Lower revenue still rewards
  # service level but gives holding/backlog costs meaningful weight.
  #
  # Calibration guide:
  #   demand_mean ~ 1.41 units/step/SKU. At 100% service level a retailer earns:
  #     3 SKUs * 1.41 * 2.5 = ~10.6 revenue/step
  #   Holding 5 units costs: 5 * 1.5 = 7.5/step  → meaningful now
  #   Ordering 3 units costs: 1.0 fixed + 1.2*3 = 4.6 variable = 5.6/order
  #   => Agents must balance: order enough to serve demand but not so much they hoard.
  sale_revenue_retailer: 2.5   # per unit of customer demand fulfilled (retailer)

  # === EXCESS INVENTORY PENALTY ===
  # Penalizes holding inventory above a target multiple of daily demand.
  # This creates a soft cap on stocking behavior: holding a little buffer is fine,
  # but hoarding 10x demand is heavily penalized.
  #
  # target_stock_days: number of days of demand to target (e.g. 5 = 5×mean demand)
  #   For retailers: target = 5 × 1.41 ≈ 7 units/SKU
  #   For DCs:       target = 14 × 10.5 ≈ 147 units/SKU (1 full lead-time cycle)
  # excess_penalty_retailer: cost per unit above target, per step
  # excess_penalty_dc:       cost per unit above target, per step
  target_stock_days_retailer: 5    # target = 5 × mean_daily_demand
  target_stock_days_dc: 14         # target = 14 × dc_daily_drain
  excess_penalty_retailer: 2.5     # INCREASED: MUST be > sale_revenue (2.5) to stop hoarding!
  excess_penalty_dc: 0.03          # per unit above target per step (DC scale much larger)

  # Alpha-weighted local + global reward mixing.
  # Each agent's reward = (1 - alpha) * local + alpha * global_mean.
  # 0.0 = purely local (old behaviour), 0.2 = recommended, 1.0 = purely global.
  alpha: 0.2

  # === HEURISTIC-GUIDED REWARD SHAPING (Look-Back PBRS) ===
  # Φ(s,a) = -k · |a†(s) - a|   where a†(s) is the Dynamic Base-Stock recommendation.
  # Shaping bonus F = Φ(s_t, a_t) - Φ(s_{t-1}, a_{t-1}) , weighted by shaping_weight.
  # shaping_weight is annealed by calling env.decay_shaping_weight() in the training loop.
  #
  # Tuning guide:
  #   k            : keep small relative to base reward magnitudes.
  #                  A value of 0.5 means a 10-unit deviation from the heuristic
  #                  costs -5 in the shaping term (before /max_days normalisation).
  #   demand_window: rolling window for heuristic μ/σ estimation (steps).
  #                  Shorter → reacts faster; longer → smoother signal.
  #   initial_weight: 1.0 → full shaping at episode 0; decayed by training loop.
  #   enabled      : set to false to ablate shaping without code changes.
  heuristic_shaping:
    enabled: true
    k: 0.5
    demand_window: 14
    initial_weight: 1.0

# Cost parameters (Unit: 10,000 VND)
costs:
  # DC Costs (2 DCs x 3 SKUs)
  # Holding cost kept low: DCs should hold MORE not less (they serve downstream retailers).
  holding_cost_dc:
    - [0.01, 0.02, 0.03]  # DC_0 (slightly reduced to encourage higher DC safety stock)
    - [0.01, 0.02, 0.03]  # DC_1

  backlog_cost_dc:
    # HIGH penalty: DC stockout cascades to ALL its assigned retailers.
    # Must be large enough that paying ordering cost < accepting backlog cost.
    # With sale_revenue_dc=2.0, each unit NOT shipped = lost 2.0 revenue + backlog accumulation.
    - [3.0, 2.5, 4.0]  # DC_0
    - [3.0, 2.5, 4.0]  # DC_1

  fixed_order_cost_dc:
    # Raised from 0.5 → 2.0: ensures a fixed ordering cost registers visibly
    # on the chart even against the large market-price variable component.
    # Still tiny vs DC holding/backlog (thousands per episode).
    - [2.0, 2.0, 2.0]  # DC_0
    - [2.0, 2.0, 2.0]  # DC_1
  
  # Retailer Costs (15 Retailers x 3 SKUs)
  holding_cost_retailer:
    # Demand mean=1.41/step. 
    # Increased heavily: we want to penalize retailers for hoarding 100+ units.
    # At holding_cost ~1.5/unit, 100 units = 150/step. 
    # With backlog at 6.0/unit, retailers will balance ~4 days of stock instead of massive hoarding.
    - [0.4, 0.5, 0.6]  # Retailer_0
    - [0.4, 0.5, 0.6]  # Retailer_1
    - [0.4, 0.5, 0.6]  # Retailer_2
    - [0.4, 0.5, 0.6]  # Retailer_3
    - [0.4, 0.5, 0.6]  # Retailer_4
    - [0.4, 0.5, 0.6]  # Retailer_5
    - [0.4, 0.5, 0.6]  # Retailer_6
    - [0.4, 0.5, 0.6] # Retailer_7
    - [0.4, 0.5, 0.6]  # Retailer_8
    - [0.4, 0.5, 0.6]  # Retailer_9
    - [0.4, 0.5, 0.6]  # Retailer_10
    - [0.4, 0.5, 0.6]  # Retailer_11
    - [0.4, 0.5, 0.6]  # Retailer_12
    - [0.4, 0.5, 0.6]  # Retailer_13
    - [0.4, 0.5, 0.6]  # Retailer_14
  
  backlog_cost_retailer:
    # HIGH penalty: must exceed sale_revenue_retailer=5.0 per unit.
    # If 1 unit of backlog costs 6.0/step, agent must serve demand to avoid rapid loss.
    # Backlog is CUMULATIVE: 1 unit unserved costs 6.0 * remaining_days (huge late-game).
    - [0.8, 0.7, 0.7]  # Retailer_0
    - [0.8, 0.7, 0.7]  # Retailer_1
    - [0.8, 0.7, 0.7]  # Retailer_2
    - [0.8, 0.7, 0.7]  # Retailer_3
    - [0.8, 0.7, 0.7]  # Retailer_4
    - [0.8, 0.7, 0.7]  # Retailer_5
    - [0.8, 0.7, 0.7]  # Retailer_6
    - [0.8, 0.7, 0.7]  # Retailer_7
    - [0.8, 0.7, 0.7]  # Retailer_8
    - [0.8, 0.7, 0.7]  # Retailer_9
    - [0.8, 0.7, 0.7]  # Retailer_10
    - [0.8, 0.7, 0.7]  # Retailer_11
    - [0.8, 0.7, 0.7]  # Retailer_12
    - [0.8, 0.7, 0.7]  # Retailer_13
    - [0.8, 0.7, 0.7]  # Retailer_14
  
  fixed_order_cost_retailer:
    # Increased to 1.0/SKU to discourage over-ordering.
    # Ordering near-demand (~2 units/SKU): (1.0 + 1.2×2)×3 = 10.2/step cost
    #   vs revenue 21.2/step → net +11/step ✔ still profitable
    # Ordering at max (10 units/SKU): (1.0 + 1.2×10)×3 = 39/step cost
    #   vs revenue 21.2/step + holding 12.9/step → net −30/step ✘ strongly penalized
    - [1.0, 1.0, 1.0]  # Retailer_0
    - [1.0, 1.0, 1.0]  # Retailer_1
    - [1.0, 1.0, 1.0]  # Retailer_2
    - [1.0, 1.0, 1.0]  # Retailer_3
    - [1.0, 1.0, 1.0]  # Retailer_4
    - [1.0, 1.0, 1.0]  # Retailer_5
    - [1.0, 1.0, 1.0]  # Retailer_6
    - [1.0, 1.0, 1.0]  # Retailer_7
    - [1.0, 1.0, 1.0]  # Retailer_8
    - [1.0, 1.0, 1.0]  # Retailer_9
    - [1.0, 1.0, 1.0]  # Retailer_10
    - [1.0, 1.0, 1.0]  # Retailer_11
    - [1.0, 1.0, 1.0]  # Retailer_12
    - [1.0, 1.0, 1.0]  # Retailer_13
    - [1.0, 1.0, 1.0]  # Retailer_14
  
  # Variable costs for ordering from DCs (per unit transportation/handling)
  # Shape: (n_retailers, n_dcs, n_skus)
  # Increased to 1.0-1.5/unit to penalize ordering well above demand.
  # Each extra unit beyond demand costs 1.2/unit + 1.5 holding/step → strong deterrent to hoarding.
  variable_cost_retailer:
    # Retailer_0
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_1
    - [ [1.20, 1.00, 1.50],
        [1.00, 0.90, 1.30] ]
    # Retailer_2
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_3
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_4
    - [ [1.20, 1.00, 1.50],
        [1.00, 0.90, 1.30] ]
    # Retailer_5
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_6
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_7
    - [ [1.20, 1.00, 1.50],
        [1.00, 0.90, 1.30] ]
    # Retailer_8
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_9
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_10
    - [ [1.20, 1.00, 1.50],
        [1.00, 0.90, 1.30] ]
    # Retailer_11
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_12
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]
    # Retailer_13
    - [ [1.20, 1.00, 1.50],
        [1.00, 0.90, 1.30] ]
    # Retailer_14
    - [ [1.00, 0.90, 1.30],
        [1.20, 1.00, 1.50] ]

# Market Pricing (for DC orders from supplier)
pricing:
  # Prices reduced 10x so variable ordering cost competes fairly with holding/backlog costs.
  # At price=10, ordering 30 units cost 303 immediately vs backlog at 2.5/unit/step →
  # agents rationally avoided ordering. At price=1.0, ordering 30 units = 33 cost,
  # which breaks even against just ~1 unit of backlog for ~1 day → ordering is rational.
  base_price: [1.0, 0.8, 1.5]  # Base prices per SKU (reduced from [10, 8, 15])
  min_price: [0.6, 0.4, 1.0]   # Price floor  (reduced from [6, 4, 10])
  max_price: [1.8, 1.4, 2.5]   # Price ceiling (reduced from [18, 14, 25])
  volatility: 0.15  # ±15% typical variation
